  <g transform="translate(1220,1040)">
    <rect x="0" y="0" width="850" height="600" rx="10" ry="10" class="noteBox"/>
    <text x="20" y="34" class="subtitle">Assembly Notes</text>
    <text x="20" y="76" class="label">1. The assembly uses two separate trapped hose plugs, one per port, with the block body staying unchanged across the three OD options.</text>
    <text x="20" y="116" class="label">2. The lid remains the thermal part and carries the six straight 56 mm channels plus the upper transition roof.</text>
    <text x="20" y="156" class="label">3. The base carries the rectangular seal groove and the lower transition floor; it must not imply a straight-channel cavity below the core.</text>
    <text x="20" y="196" class="label">4. Installed preview geometry uses the 16.0 mm hose-plug OD, but the body, pocket, and seal architecture stay the same for the 15.4 and 14.8 options.</text>
    <text x="20" y="236" class="label">5. Final wet-path baseline: 316L stainless lid, CNC POM base, and CNC POM hose plugs.</text>
    <text x="20" y="276" class="label">6. Maintain the 14.5 mm minimum bore all the way through the hose plug, the throat, and the block-owned flow path.</text>
    <text x="20" y="316" class="label">7. Final clamp control should use through-bolts, washers, and compression control rather than relying on tapped plastic alone.</text>
    <text x="20" y="376" class="subtitle">Current Fixed Geometry</text>
    <text x="20" y="410" class="label">Body 140 x 92 x 24 | Lid 8 | Base 16 | Plug projection 24 each side</text>
    <text x="20" y="438" class="label">Cavity 112 x 62 x 6 | 6 channels at about 8.67 x 56 x 6 | O-ring groove CL 116 x 68</text>
    <text x="20" y="466" class="label">Landing 64 x 64 | Hot-side mount 78 x 78 | Plug root flange 22 OD x 2 thick</text>
    <text x="20" y="494" class="label">Trapped neck 16.8 OD x 4 long | Capture head 22 x 15 x 6 | Throat 17</text>
    <line x1="20" y1="534" x2="830" y2="534" class="divider"/>
    <text x="20" y="566" class="small">Use the dedicated lid, base, and hose-plug sheets for ownership details and supplier-facing review. This sheet is the assembled geometry summary only.</text>
  </g>
</svg>
