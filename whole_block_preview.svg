  <g transform="translate(1100,860)">
    <rect x="0" y="0" width="860" height="580" class="noteBox"/>
    <text x="20" y="34" class="subtitle">Refined Main-Block Notes</text>
    <text x="20" y="74" class="label">1. The block grew to 140 x 92 x 24 so the 14.5 mm bore and smooth</text>
    <text x="44" y="98" class="label">manifolds fit cleanly without hidden neck-downs.</text>
    <text x="20" y="138" class="label">2. The core stays at 6 wider channels because low head loss matters more</text>
    <text x="44" y="162" class="label">than squeezing in extra lanes.</text>
    <text x="20" y="202" class="label">3. The channel pack open area remains above the Fluval hose area, so the</text>
    <text x="44" y="226" class="label">core should not become the hydraulic choke point.</text>
    <text x="20" y="266" class="label">4. The port axis sits 1.25 mm below the split plane so the lid still keeps</text>
    <text x="44" y="290" class="label">a 2 mm roof over the upper half-bore.</text>
    <text x="20" y="330" class="label">5. The full-block spigot OD is still provisional; only that OD should move</text>
    <text x="44" y="354" class="label">after the hose coupons are tested.</text>
    <text x="20" y="394" class="label">6. Keep the split spigots smooth outside and full-bore inside.</text>
    <text x="20" y="426" class="label">7. Hot-side mount: 4 x Intel LGA1700 / LGA1851 on a 78 x 78 mm square.</text>
    <text x="20" y="474" class="subtitle">Current Fixed Geometry</text>
    <text x="20" y="504" class="label">Body 140 x 92 x 24 | Lid 8 | Base 16 | Cavity 112 x 62 x 6</text>
    <text x="20" y="528" class="label">Channels 6 x 8.67 x 56 x 6 | Fins 5 x 2 | 14.5 mm min bore</text>
    <text x="20" y="552" class="label">Landing 64 x 64 | Hot-side mount 78 x 78</text>
  </g>
</svg>