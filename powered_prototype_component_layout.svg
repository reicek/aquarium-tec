<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2200 1600" width="2200" height="1600">
  <defs>
    <marker id="dimArrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,5 L10,0 L8,5 L10,10 z" fill="#1f2933"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #1f2933; }
      .subtitle { font: 700 18px Arial, sans-serif; fill: #1f2933; }
      .label { font: 14px Arial, sans-serif; fill: #1f2933; }
      .small { font: 12px Arial, sans-serif; fill: #1f2933; }
      .tiny { font: 11px Arial, sans-serif; fill: #1f2933; }
      .outline { fill: none; stroke: #1f2933; stroke-width: 2; }
      .hidden { fill: none; stroke: #7b90b8; stroke-width: 1.5; stroke-dasharray: 8 6; }
      .centerline { fill: none; stroke: #98a1af; stroke-width: 1.2; stroke-dasharray: 10 6 2 6; }
      .divider { fill: none; stroke: #98a1af; stroke-width: 1.2; }
      .leader { fill: none; stroke: #1f2933; stroke-width: 1.2; }
      .dim { fill: none; stroke: #1f2933; stroke-width: 1.2; marker-start: url(#dimArrow); marker-end: url(#dimArrow); }
      .ext { fill: none; stroke: #1f2933; stroke-width: 1; }
      .noteBox { fill: #fcfdff; stroke: #1f2933; stroke-width: 1.5; }
      .metalA { fill: #f7f8fa; stroke: #1f2933; stroke-width: 1.8; }
      .metalB { fill: #e6e9ef; stroke: #1f2933; stroke-width: 1.8; }
      .heat { fill: #fde1c4; stroke: #c56a1b; stroke-width: 1.4; }
      .accent { fill: #d9ecff; stroke: #2563eb; stroke-width: 1.4; }
    </style>
  </defs>

  <rect width="2200" height="1600" fill="#ffffff"/>

  <text x="1100" y="46" text-anchor="middle" class="title">Powered Prototype Component Layout</text>
  <text x="1100" y="74" text-anchor="middle" class="label">2D reference placement sheet for the current dry-fit and dry-wire support assembly</text>
  <text x="1100" y="100" text-anchor="middle" class="small">Units: mm | Scale: not to scale | Source of truth: tec_cold_block_mockup.scad for support geometry</text>
  <text x="1100" y="122" text-anchor="middle" class="small">Reference diagram only; use the wiring document for harness IDs and cut lengths, and the order list for exact buying decisions.</text>

  <g transform="translate(70,180)">
    <rect x="0" y="0" width="1160" height="840" rx="10" ry="10" class="noteBox"/>
    <text x="20" y="34" class="subtitle">Plan View</text>
    <line x1="20" y1="52" x2="1140" y2="52" class="divider"/>

    <text x="492" y="92" text-anchor="middle" class="label">Front / display side</text>
    <text x="492" y="728" text-anchor="middle" class="label">Rear / service side</text>

    <rect x="120" y="120" width="744" height="570" class="outline"/>
    <line x1="492" y1="120" x2="492" y2="690" class="centerline"/>

    <rect x="363" y="120" width="258" height="126" class="metalA"/>
    <circle cx="492" cy="183" r="52" class="accent"/>
    <rect x="399" y="132" width="186" height="102" class="hidden"/>

    <rect x="282" y="246" width="420" height="276" class="metalB"/>
    <rect x="396" y="288" width="192" height="192" class="hidden"/>
    <rect x="435" y="351" width="114" height="66" class="hidden"/>
    <circle cx="492" cy="177" r="18" class="metalA"/>

    <rect x="169.5" y="588" width="645" height="90" class="metalA"/>
    <rect x="414" y="534" width="156" height="156" class="hidden"/>
    <rect x="324" y="654" width="60" height="24" class="hidden"/>
    <rect x="120" y="678" width="744" height="12" class="metalB"/>

    <line x1="120" y1="92" x2="864" y2="92" class="dim"/>
    <line x1="120" y1="120" x2="120" y2="92" class="ext"/>
    <line x1="864" y1="120" x2="864" y2="92" class="ext"/>
    <text x="492" y="82" text-anchor="middle" class="label">248 support footprint length</text>

    <line x1="88" y1="120" x2="88" y2="690" class="dim"/>
    <line x1="120" y1="120" x2="88" y2="120" class="ext"/>
    <line x1="120" y1="690" x2="88" y2="690" class="ext"/>
    <text x="70" y="405" transform="rotate(-90 70 405)" text-anchor="middle" class="label">190 support footprint depth</text>

    <line x1="282" y1="544" x2="702" y2="544" class="dim"/>
    <line x1="282" y1="522" x2="282" y2="544" class="ext"/>
    <line x1="702" y1="522" x2="702" y2="544" class="ext"/>
    <text x="492" y="566" text-anchor="middle" class="small">140 block body length</text>

    <line x1="734" y1="246" x2="734" y2="522" class="dim"/>
    <line x1="702" y1="246" x2="734" y2="246" class="ext"/>
    <line x1="702" y1="522" x2="734" y2="522" class="ext"/>
    <text x="752" y="384" transform="rotate(-90 752 384)" text-anchor="middle" class="small">92 block body width</text>

    <text x="44" y="296" class="label">A1 Cold block, TEC, copper, and cooler stack</text>
    <line x1="264" y1="292" x2="336" y2="330" class="leader"/>

    <text x="642" y="184" class="label">C1 Round Display and XIAO on display mast</text>
    <line x1="630" y1="188" x2="552" y2="183" class="leader"/>

    <text x="826" y="624" class="label">P1 Mean Well LRS-350-24 footprint</text>
    <line x1="820" y1="628" x2="760" y2="632" class="leader"/>

    <text x="636" y="470" class="label">S3 Leak sensor floor zone under block</text>
    <line x1="628" y1="474" x2="550" y2="396" class="leader"/>

    <text x="640" y="658" class="small">D1 and P2 mount on the rear service spine shown dashed here</text>
    <line x1="636" y1="662" x2="570" y2="622" class="leader"/>

    <text x="208" y="650" class="small">S2 humidity board on rear panel, display side</text>
    <line x1="304" y1="646" x2="336" y2="666" class="leader"/>

    <text x="540" y="152" class="small">BZ1 local alarm in the front display-base area</text>
    <line x1="532" y1="156" x2="510" y2="177" class="leader"/>

    <line x1="30" y1="772" x2="1130" y2="772" class="divider"/>
    <text x="30" y="802" class="small">The plan view shows component zones only. Rear-face hardware is deliberately abstracted here so the sheet stays readable without another pseudo-3D overlay.</text>
    <text x="30" y="828" class="small">Current documentation assumes the 16.0 mm hose-plug option on both ports for the dry prototype component package.</text>
  </g>

  <g transform="translate(1260,180)">
    <rect x="0" y="0" width="870" height="840" rx="10" ry="10" class="noteBox"/>
    <text x="20" y="34" class="subtitle">Rear Service Elevation</text>
    <line x1="20" y1="52" x2="850" y2="52" class="divider"/>

    <rect x="354" y="119" width="156" height="577" class="metalB"/>
    <rect x="60" y="696" width="744" height="24" class="metalB"/>
    <rect x="109.5" y="333" width="645" height="345" class="metalA"/>
    <rect x="357.5" y="155" width="149" height="148" class="noteBox"/>
    <rect x="360" y="504" width="144" height="156" class="noteBox"/>
    <rect x="264" y="492" width="60" height="84" class="noteBox"/>
    <circle cx="432" cy="594" r="12" class="outline"/>

    <line x1="60" y1="96" x2="804" y2="96" class="dim"/>
    <line x1="60" y1="119" x2="60" y2="96" class="ext"/>
    <line x1="804" y1="119" x2="804" y2="96" class="ext"/>
    <text x="432" y="86" text-anchor="middle" class="label">248 rear service width</text>

    <line x1="828" y1="119" x2="828" y2="720" class="dim"/>
    <line x1="804" y1="119" x2="828" y2="119" class="ext"/>
    <line x1="804" y1="720" x2="828" y2="720" class="ext"/>
    <text x="846" y="420" transform="rotate(-90 846 420)" text-anchor="middle" class="label">200 support rear-service height</text>

    <line x1="778" y1="333" x2="778" y2="678" class="dim"/>
    <line x1="754.5" y1="333" x2="778" y2="333" class="ext"/>
    <line x1="754.5" y1="678" x2="778" y2="678" class="ext"/>
    <text x="796" y="505" transform="rotate(-90 796 505)" text-anchor="middle" class="small">115 PSU height</text>

    <line x1="357.5" y1="132" x2="506.5" y2="132" class="dim"/>
    <line x1="357.5" y1="155" x2="357.5" y2="132" class="ext"/>
    <line x1="506.5" y1="155" x2="506.5" y2="132" class="ext"/>
    <text x="432" y="122" text-anchor="middle" class="small">49.7 BTS7960 body width</text>

    <text x="36" y="364" class="label">P1 Mean Well LRS-350-24</text>
    <line x1="228" y1="360" x2="200" y2="400" class="leader"/>

    <text x="524" y="188" class="label">D1 IBT-2 Double BTS7960</text>
    <line x1="518" y1="192" x2="494" y2="222" class="leader"/>

    <text x="520" y="548" class="label">P2 TOBSUN EA15-5V below D1</text>
    <line x1="514" y1="552" x2="488" y2="582" class="leader"/>

    <text x="176" y="520" class="small">S2 Adafruit SHT31-D on rear panel, display side</text>
    <line x1="258" y1="524" x2="280" y2="534" class="leader"/>

    <text x="454" y="626" class="small">S1 temperature splice below the driver shelf</text>
    <line x1="448" y1="630" x2="432" y2="594" class="leader"/>

    <line x1="20" y1="772" x2="850" y2="772" class="divider"/>
    <text x="20" y="802" class="small">The rear view is the main service-side placement reference: PSU low, BTS7960 centered above, TOBSUN centered below, and low-current sensing kept on the display side of the rear panel.</text>
    <text x="20" y="828" class="small">The big open window above the buck zone remains intentional for cable service access and for keeping the rev-1 spine printable and accessible.</text>
  </g>

  <g transform="translate(70,1060)">
    <rect x="0" y="0" width="2060" height="460" rx="10" ry="10" class="noteBox"/>
    <text x="20" y="34" class="subtitle">Component Schedule And Notes</text>
    <line x1="20" y1="52" x2="2040" y2="52" class="divider"/>

    <rect x="20" y="80" width="1360" height="344" class="noteBox"/>
    <line x1="110" y1="80" x2="110" y2="424" class="divider"/>
    <line x1="330" y1="80" x2="330" y2="424" class="divider"/>
    <line x1="880" y1="80" x2="880" y2="424" class="divider"/>
    <line x1="20" y1="112" x2="1380" y2="112" class="divider"/>

    <text x="36" y="101" class="label">Ref</text>
    <text x="126" y="101" class="label">Item</text>
    <text x="346" y="101" class="label">Exact Part</text>
    <text x="896" y="101" class="label">Current Mounting Intent</text>

    <line x1="20" y1="136" x2="1380" y2="136" class="divider"/>
    <line x1="20" y1="160" x2="1380" y2="160" class="divider"/>
    <line x1="20" y1="184" x2="1380" y2="184" class="divider"/>
    <line x1="20" y1="208" x2="1380" y2="208" class="divider"/>
    <line x1="20" y1="232" x2="1380" y2="232" class="divider"/>
    <line x1="20" y1="256" x2="1380" y2="256" class="divider"/>
    <line x1="20" y1="280" x2="1380" y2="280" class="divider"/>
    <line x1="20" y1="304" x2="1380" y2="304" class="divider"/>
    <line x1="20" y1="328" x2="1380" y2="328" class="divider"/>
    <line x1="20" y1="352" x2="1380" y2="352" class="divider"/>
    <line x1="20" y1="376" x2="1380" y2="376" class="divider"/>
    <line x1="20" y1="400" x2="1380" y2="400" class="divider"/>

    <text x="36" y="128" class="tiny">A1</text>
    <text x="126" y="128" class="tiny">Cold block assembly</text>
    <text x="346" y="128" class="tiny">Custom body, support cradle, and main 16.0 mm hose plugs</text>
    <text x="896" y="128" class="tiny">Centered on the support frame</text>

    <text x="36" y="152" class="tiny">A2</text>
    <text x="126" y="152" class="tiny">TEC module</text>
    <text x="346" y="152" class="tiny">TEC126306 / TEC1-26306, 50 x 50 mm</text>
    <text x="896" y="152" class="tiny">Between the lid landing and the copper spreader</text>

    <text x="36" y="176" class="tiny">A3</text>
    <text x="126" y="176" class="tiny">Copper spreader</text>
    <text x="346" y="176" class="tiny">C110 copper plate, 60 x 60 x 5</text>
    <text x="896" y="176" class="tiny">Between A2 and A4</text>

    <text x="36" y="200" class="tiny">A4</text>
    <text x="126" y="200" class="tiny">Hot-side heatsink</text>
    <text x="346" y="200" class="tiny">Thermalright Assassin X 120 Refined SE</text>
    <text x="896" y="200" class="tiny">Above A1 on the LGA1700 pattern</text>

    <text x="36" y="224" class="tiny">M1</text>
    <text x="126" y="224" class="tiny">Hot-side fan</text>
    <text x="346" y="224" class="tiny">Noctua NF-F12 industrialPPC-24V-2000</text>
    <text x="896" y="224" class="tiny">On A4 with the 24 V airflow path</text>

    <text x="36" y="248" class="tiny">C1</text>
    <text x="126" y="248" class="tiny">Controller and HMI</text>
    <text x="346" y="248" class="tiny">XIAO nRF52840 Plus and Round Display</text>
    <text x="896" y="248" class="tiny">Front display mast and lower opening band</text>

    <text x="36" y="272" class="tiny">P1</text>
    <text x="126" y="272" class="tiny">Main PSU</text>
    <text x="346" y="272" class="tiny">Mean Well LRS-350-24</text>
    <text x="896" y="272" class="tiny">Rear service zone, low in the structure</text>

    <text x="36" y="296" class="tiny">D1</text>
    <text x="126" y="296" class="tiny">TEC driver</text>
    <text x="346" y="296" class="tiny">IBT-2 Double BTS7960</text>
    <text x="896" y="296" class="tiny">Rear spine with the heatsink outboard</text>

    <text x="36" y="320" class="tiny">P2</text>
    <text x="126" y="320" class="tiny">Logic buck</text>
    <text x="346" y="320" class="tiny">TOBSUN EA15-5V, 24 V to 5 V</text>
    <text x="896" y="320" class="tiny">Lower rear spine, below D1</text>

    <text x="36" y="344" class="tiny">S1</text>
    <text x="126" y="344" class="tiny">1-Wire splice</text>
    <text x="346" y="344" class="tiny">S_TEMP branch node</text>
    <text x="896" y="344" class="tiny">Rear panel center, below the driver shelf</text>

    <text x="36" y="368" class="tiny">S2</text>
    <text x="126" y="368" class="tiny">Humidity sensor</text>
    <text x="346" y="368" class="tiny">Adafruit SHT31-D, PID 2857</text>
    <text x="896" y="368" class="tiny">Rear panel on the display side</text>

    <text x="36" y="392" class="tiny">S3</text>
    <text x="126" y="392" class="tiny">Leak sensor</text>
    <text x="346" y="392" class="tiny">DFRobot SEN0205</text>
    <text x="896" y="392" class="tiny">Support floor under the block envelope</text>

    <text x="36" y="416" class="tiny">BZ1</text>
    <text x="126" y="416" class="tiny">Local alarm</text>
    <text x="346" y="416" class="tiny">Mallory Sonalert PS-580Q</text>
    <text x="896" y="416" class="tiny">Front display-base area</text>

    <rect x="1420" y="80" width="620" height="344" class="noteBox"/>
    <text x="1440" y="108" class="label">Notes That Matter</text>
    <line x1="1440" y1="120" x2="2020" y2="120" class="divider"/>
    <text x="1440" y="150" class="small">1. Use agent/powered_prototype_wiring_diagram.md</text>
    <text x="1460" y="170" class="small">for harness IDs, wire colors, and cut lengths.</text>
    <text x="1440" y="204" class="small">2. Use agent/powered_prototype_order_list.md</text>
    <text x="1460" y="224" class="small">as the buy-list baseline for the same revision.</text>
    <text x="1440" y="258" class="small">3. Component locations are interpretive and tied to</text>
    <text x="1460" y="278" class="small">the current support geometry, not to release tolerances.</text>
    <text x="1440" y="312" class="small">4. Dry assembly only: do not treat this sheet as wet-test</text>
    <text x="1460" y="332" class="small">approval for printed wet-path hardware.</text>
    <text x="1440" y="366" class="small">5. Current documentation assumes the 16.0 mm main hose-plug</text>
    <text x="1460" y="386" class="small">option on both ports for the powered prototype package.</text>
    <text x="1440" y="420" class="small">6. Pair this sheet with powered_prototype_electrical_block.svg</text>
    <text x="1460" y="440" class="small">for the primary color-coded wiring view.</text>
  </g>
</svg>