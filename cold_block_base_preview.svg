<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2140 1500" width="2140" height="1500">
  <defs>
    <marker id="dimArrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,5 L10,0 L8,5 L10,10 z" fill="#1f2933"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #1f2933; }
      .subtitle { font: 700 18px Arial, sans-serif; fill: #1f2933; }
      .label { font: 14px Arial, sans-serif; fill: #1f2933; }
      .small { font: 12px Arial, sans-serif; fill: #1f2933; }
      .tiny { font: 11px Arial, sans-serif; fill: #1f2933; }
      .outline { fill: none; stroke: #1f2933; stroke-width: 2; }
      .hidden { fill: none; stroke: #7b90b8; stroke-width: 1.5; stroke-dasharray: 8 6; }
      .centerline { fill: none; stroke: #98a1af; stroke-width: 1.2; stroke-dasharray: 10 6 2 6; }
      .dim { fill: none; stroke: #1f2933; stroke-width: 1.3; marker-start: url(#dimArrow); marker-end: url(#dimArrow); }
      .ext { fill: none; stroke: #1f2933; stroke-width: 1; }
      .leader { fill: none; stroke: #1f2933; stroke-width: 1; }
      .divider { fill: none; stroke: #98a1af; stroke-width: 1.2; }
      .water { fill: #d9ecff; stroke: #2563eb; stroke-width: 1.6; }
      .metalB { fill: #e6e9ef; stroke: #1f2933; stroke-width: 2; }
      .oring { fill: none; stroke: #2f7d4a; stroke-width: 2; stroke-dasharray: 10 5; }
      .seal { fill: #eaf5ec; stroke: #2f7d4a; stroke-width: 1.5; }
      .noteBox { fill: #fcfdff; stroke: #1f2933; stroke-width: 1.5; }
    </style>
  </defs>

  <rect x="0" y="0" width="2140" height="1500" fill="#fff"/>

  <text x="1070" y="48" text-anchor="middle" class="title">Cold-Block Base Preview</text>
  <text x="1070" y="78" text-anchor="middle" class="label">Base-half reference sheet for the split-plane face, seal groove, and lower transition-floor ownership</text>
  <text x="1070" y="102" text-anchor="middle" class="small">Units: mm | Scale: not to scale | Source of truth: tec_cold_block_mockup.scad</text>
  <text x="1070" y="124" text-anchor="middle" class="small">Reference diagram only; use formal CAD, STEP, and a release drawing for manufacturing.</text>

  <g transform="translate(70,210)">
    <rect x="0" y="0" width="980" height="760" rx="10" ry="10" class="noteBox"/>
    <text x="20" y="34" class="subtitle">Split-Plane Face</text>
    <line x1="20" y1="52" x2="960" y2="52" class="divider"/>

    <g transform="translate(0,10)">
      <rect x="140" y="130" width="700" height="460" class="outline"/>
      <rect x="145" y="305" width="50" height="110" rx="12" ry="12" class="outline"/>
      <rect x="790" y="305" width="50" height="110" rx="12" ry="12" class="outline"/>
      <rect x="210" y="205" width="560" height="310" class="hidden"/>
      <polygon points="210,328.75 350,205 350,515 210,391.25" class="hidden"/>
      <polygon points="630,205 770,328.75 770,391.25 630,515" class="hidden"/>
      <rect x="200" y="190" width="580" height="340" class="oring"/>

      <circle cx="170" cy="160" r="6.25" class="outline"/>
      <circle cx="295" cy="165" r="10.75" class="outline"/>
      <circle cx="490" cy="160" r="6.25" class="outline"/>
      <circle cx="685" cy="165" r="10.75" class="outline"/>
      <circle cx="810" cy="160" r="6.25" class="outline"/>
      <circle cx="170" cy="560" r="6.25" class="outline"/>
      <circle cx="295" cy="555" r="10.75" class="outline"/>
      <circle cx="490" cy="560" r="6.25" class="outline"/>
      <circle cx="685" cy="555" r="10.75" class="outline"/>
      <circle cx="810" cy="560" r="6.25" class="outline"/>

      <line x1="120" y1="360" x2="860" y2="360" class="centerline"/>
      <text x="56" y="238" class="tiny">Plug pocket outline</text>
      <line x1="132" y1="242" x2="164" y2="305" class="leader"/>

      <line x1="140" y1="96" x2="840" y2="96" class="dim"/>
      <line x1="140" y1="130" x2="140" y2="96" class="ext"/>
      <line x1="840" y1="130" x2="840" y2="96" class="ext"/>
      <text x="490" y="86" text-anchor="middle" class="label">140 body</text>

      <line x1="100" y1="130" x2="100" y2="590" class="dim"/>
      <line x1="140" y1="130" x2="100" y2="130" class="ext"/>
      <line x1="140" y1="590" x2="100" y2="590" class="ext"/>
      <text x="82" y="360" transform="rotate(-90 82 360)" text-anchor="middle" class="label">92</text>

      <line x1="200" y1="620" x2="780" y2="620" class="dim"/>
      <line x1="200" y1="530" x2="200" y2="620" class="ext"/>
      <line x1="780" y1="530" x2="780" y2="620" class="ext"/>
      <text x="490" y="642" text-anchor="middle" class="label">116 groove centerline length</text>

      <line x1="860" y1="190" x2="900" y2="190" class="ext"/>
      <line x1="860" y1="530" x2="900" y2="530" class="ext"/>
      <line x1="900" y1="190" x2="900" y2="530" class="dim"/>
      <text x="918" y="360" transform="rotate(-90 918 360)" text-anchor="middle" class="label">68 groove centerline width</text>

      <line x1="30" y1="688" x2="950" y2="688" class="divider"/>
      <text x="30" y="716" class="small">6 x 2.5 pilot holes plus 4 x 4.3 hot-side through-holes remain on this base face.</text>
      <text x="30" y="742" class="small">Dashed cavity geometry indicates the lid-owned core above; the green groove is the base-owned seal path.</text>
    </g>
  </g>

  <g transform="translate(1090,210)">
    <rect x="0" y="0" width="980" height="760" rx="10" ry="10" class="noteBox"/>
    <text x="20" y="34" class="subtitle">Section A-A Through Base-Owned Water Geometry</text>
    <line x1="20" y1="52" x2="960" y2="52" class="divider"/>

    <g transform="translate(0,30)">
      <rect x="120" y="200" width="630" height="72" class="metalB"/>
      <rect x="132" y="200" width="50" height="56" class="hidden"/>
      <rect x="688" y="200" width="50" height="56" class="hidden"/>
      <rect x="246" y="173" width="252" height="27" class="hidden"/>
      <rect x="120" y="186" width="90" height="14" class="hidden"/>
      <rect x="660" y="186" width="90" height="14" class="hidden"/>
      <path d="M 120 200 L 246 200 L 210 265.25 L 120 265.25 Z" class="water"/>
      <path d="M 498 200 L 750 200 L 750 265.25 L 624 265.25 C 592 265.25 579 258 561 249 C 543 240 530 232 498 200 Z" class="water"/>

      <text x="20" y="184" class="tiny">Hidden lid-owned upper lanes</text>
      <line x1="142" y1="188" x2="150" y2="186" class="leader"/>
      <text x="18" y="290" class="tiny">Lower inlet half-bore and floor</text>
      <text x="330" y="290" class="tiny">Solid base under the straight-channel region</text>
      <text x="610" y="290" class="tiny">Lower outlet half-bore and floor</text>

      <line x1="120" y1="150" x2="750" y2="150" class="dim"/>
      <line x1="120" y1="200" x2="120" y2="150" class="ext"/>
      <line x1="750" y1="200" x2="750" y2="150" class="ext"/>
      <text x="435" y="140" text-anchor="middle" class="label">140 body</text>

      <line x1="786" y1="200" x2="836" y2="200" class="ext"/>
      <line x1="786" y1="272" x2="836" y2="272" class="ext"/>
      <line x1="836" y1="200" x2="836" y2="272" class="dim"/>
      <text x="854" y="236" transform="rotate(-90 854 236)" text-anchor="middle" class="label">16 base</text>

      <line x1="246" y1="318" x2="372" y2="318" class="dim"/>
      <line x1="246" y1="265.25" x2="246" y2="318" class="ext"/>
      <line x1="372" y1="200" x2="372" y2="318" class="ext"/>
      <text x="309" y="340" text-anchor="middle" class="label">28 lower diffuser floor</text>

      <line x1="498" y1="318" x2="624" y2="318" class="dim"/>
      <line x1="498" y1="200" x2="498" y2="318" class="ext"/>
      <line x1="624" y1="265.25" x2="624" y2="318" class="ext"/>
      <text x="561" y="340" text-anchor="middle" class="label">28 lower converger floor</text>

      <g transform="translate(0,360)">
        <text x="0" y="-18" class="subtitle">Groove Detail</text>
        <rect x="0" y="0" width="470" height="190" rx="10" ry="10" class="noteBox"/>
        <rect x="70" y="74" width="280" height="50" class="metalB"/>
        <rect x="166" y="74" width="88" height="17" class="seal"/>
        <line x1="166" y1="74" x2="166" y2="48" class="ext"/>
        <line x1="254" y1="74" x2="254" y2="48" class="ext"/>
        <line x1="166" y1="48" x2="254" y2="48" class="dim"/>
        <text x="210" y="36" text-anchor="middle" class="label">2.4 groove width</text>
        <line x1="278" y1="74" x2="318" y2="74" class="ext"/>
        <line x1="278" y1="91" x2="318" y2="91" class="ext"/>
        <line x1="318" y1="74" x2="318" y2="91" class="dim"/>
        <text x="336" y="82" transform="rotate(-90 336 82)" text-anchor="middle" class="label">1.5 depth</text>
        <text x="24" y="150" class="small">This rectangular groove stays in the base for both the PLA fit round and the final CNC POM release.</text>
        <text x="24" y="172" class="small">Keep edges clean and burr-free so the seal does not roll or nick during assembly.</text>
      </g>
    </g>
  </g>

  <g transform="translate(70,980)">
    <rect x="0" y="0" width="980" height="520" rx="10" ry="10" class="noteBox"/>
    <text x="20" y="34" class="subtitle">Base Ownership Notes</text>
    <text x="20" y="76" class="label">1. The base owns the rectangular seal groove on the 116 x 68 mm centerline rectangle and the lower transition floors on both ends.</text>
    <text x="20" y="116" class="label">2. The base does not own the six straight lanes. The solid region under the core must remain solid in base-only reference views.</text>
    <text x="20" y="156" class="label">3. The trapped hose-plug pocket is shared with the lid, but the straight-channel cavity must not be implied under the split plane on this sheet.</text>
    <text x="20" y="196" class="label">4. Assembly holes in the base are 2.5 mm pilot holes. The four 4.3 mm hot-side mount holes still pass through this part.</text>
    <text x="20" y="236" class="label">5. Final wet-path material for the base is CNC POM, with through-bolts and compression control preferred over tapped plastic-only clamp load.</text>
    <text x="20" y="276" class="label">6. Keep the transition floors smooth and do not introduce any hidden bore reduction around the plug throat or plenum entry.</text>
    <text x="20" y="336" class="subtitle">Current Base Summary</text>
    <text x="20" y="370" class="label">Body face 140 x 92 | Base thickness 16 | Groove 2.4 wide x 1.5 deep | Groove CL 116 x 68</text>
    <text x="20" y="398" class="label">Plug throat 17 | Shared neck 16.8 x 4 | Shared capture head 22 x 15 x 6</text>
    <line x1="20" y1="446" x2="960" y2="446" class="divider"/>
    <text x="20" y="478" class="small">Use this sheet when checking groove ownership, lower-flow geometry, and clamp strategy. Do not use it to infer straight-lane machining in the base.</text>
  </g>

  <g transform="translate(1090,980)">
    <rect x="0" y="0" width="980" height="520" rx="10" ry="10" class="noteBox"/>
    <text x="20" y="34" class="subtitle">Seal And Clamp Notes</text>
    <text x="20" y="76" class="label">1. The rectangular groove is sized for a 2 mm nominal seal section with controlled compression once the final hybrid stack is frozen.</text>
    <text x="20" y="116" class="label">2. Final assembly should use through-bolts, washers, and compression control so the POM base is not carrying uncontrolled local clamp load.</text>
    <text x="20" y="156" class="label">3. The base and hose plugs remain CNC POM in the final wet path; do not replace them with coated printed parts for release hardware.</text>
    <text x="20" y="196" class="label">4. Keep the plug-pocket edges, groove walls, and transition-floor edges deburred before assembly or leak testing.</text>
    <text x="20" y="236" class="label">5. If machining radii require a local relief, it must be explicit and must not change the seal path or reduce the 14.5 mm minimum bore baseline.</text>
    <text x="20" y="296" class="subtitle">Release Reminder</text>
    <text x="20" y="330" class="label">Prototype sheet usage: geometry review and PLA-first fit validation.</text>
    <text x="20" y="358" class="label">Final release usage: same geometry exported as neutral CNC data plus a manufacturing drawing with material, finish, and inspection notes.</text>
  </g>
</svg>
