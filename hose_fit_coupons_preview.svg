<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1040" width="1920" height="1040">
  <defs>
    <marker id="dimArrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,5 L10,0 L8,5 L10,10 z" fill="#1f2933"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #1f2933; }
      .subtitle { font: 700 18px Arial, sans-serif; fill: #1f2933; }
      .label { font: 14px Arial, sans-serif; fill: #1f2933; }
      .small { font: 12px Arial, sans-serif; fill: #1f2933; }
      .tiny { font: 11px Arial, sans-serif; fill: #1f2933; }
      .outline { fill: none; stroke: #1f2933; stroke-width: 2; }
      .dim { fill: none; stroke: #1f2933; stroke-width: 1.3; marker-start: url(#dimArrow); marker-end: url(#dimArrow); }
      .ext { fill: none; stroke: #1f2933; stroke-width: 1; }
      .leader { fill: none; stroke: #1f2933; stroke-width: 1; }
      .divider { fill: none; stroke: #98a1af; stroke-width: 1.2; }
      .part { fill: #e6e9ef; stroke: #1f2933; stroke-width: 1.6; }
      .water { fill: #d9ecff; stroke: #2563eb; stroke-width: 1.5; }
      .seal { fill: none; stroke: #2f7d4a; stroke-width: 1.6; stroke-dasharray: 8 4; }
      .noteBox { fill: #fcfdff; stroke: #1f2933; stroke-width: 1.5; }
    </style>
  </defs>

  <rect x="0" y="0" width="1920" height="1040" fill="#fff"/>

  <text x="960" y="48" text-anchor="middle" class="title">Hose Plug Size Options</text>
  <text x="960" y="78" text-anchor="middle" class="label">Three interchangeable PLA-first hose-plug options using the same trapped root geometry planned for the final hybrid block</text>
  <text x="960" y="102" text-anchor="middle" class="small">Units: mm | Scale: not to scale | Source of truth: tec_cold_block_mockup.scad</text>
  <text x="960" y="124" text-anchor="middle" class="small">Reference diagram only; use formal CAD and a release drawing for manufacturing.</text>

  <g transform="translate(70,170)">
    <rect x="0" y="0" width="520" height="560" rx="10" ry="10" class="noteBox"/>
    <text x="260" y="36" text-anchor="middle" class="subtitle">Option A</text>
    <text x="260" y="62" text-anchor="middle" class="label">14.8 OD easy-fit fallback</text>
    <line x1="40" y1="78" x2="480" y2="78" class="divider"/>

    <line x1="348" y1="124" x2="348" y2="376" class="ext"/>
    <text x="340" y="102" text-anchor="end" class="tiny">Block side face</text>

    <rect x="96" y="172.3" width="231" height="155.4" class="part"/>
    <rect x="264" y="163.9" width="12.6" height="172.2" class="part"/>
    <rect x="327" y="134.5" width="21" height="231" rx="4" ry="4" class="part"/>
    <rect x="331" y="137.6" width="13" height="224.7" rx="3" ry="3" class="seal"/>
    <rect x="348" y="161.8" width="42" height="176.4" rx="8" ry="8" class="part"/>
    <rect x="390" y="134.5" width="63" height="231" rx="24" ry="24" class="part"/>
    <rect x="96" y="173.9" width="357" height="152.2" class="water"/>

    <line x1="96" y1="402" x2="348" y2="402" class="dim"/>
    <line x1="96" y1="327.7" x2="96" y2="402" class="ext"/>
    <line x1="348" y1="365.5" x2="348" y2="402" class="ext"/>
    <text x="222" y="426" text-anchor="middle" class="label">24 plug projection</text>

    <text x="48" y="106" class="tiny">Retaining bead</text>
    <text x="48" y="120" class="tiny">16 from tip</text>
    <line x1="144" y1="116" x2="270" y2="167.8" class="leader"/>
    <text x="248" y="104" class="tiny">2 thick</text>
    <text x="248" y="118" class="tiny">face-seal flange</text>
    <line x1="318" y1="120" x2="338" y2="136.5" class="leader"/>
    <text x="430" y="100" text-anchor="middle" class="tiny">22 x 15 x 6</text>
    <text x="430" y="114" text-anchor="middle" class="tiny">capture head</text>
    <line x1="430" y1="118" x2="434" y2="134.5" class="leader"/>

    <circle cx="120" cy="472" r="42" class="water"/>
    <text x="120" y="478" text-anchor="middle" class="small">14.8</text>
    <text x="188" y="458" class="label">Outer hose OD</text>
    <text x="188" y="482" class="small">Use when larger options feel too aggressive</text>
    <text x="188" y="504" class="small">on the real hose.</text>

    <line x1="40" y1="526" x2="480" y2="526" class="divider"/>
    <text x="260" y="550" text-anchor="middle" class="small">Same 14.5 bore, same trapped root, only the outside hose OD changes.</text>
  </g>

  <g transform="translate(700,170)">
    <rect x="0" y="0" width="520" height="560" rx="10" ry="10" class="noteBox"/>
    <text x="260" y="36" text-anchor="middle" class="subtitle">Option B</text>
    <text x="260" y="62" text-anchor="middle" class="label">15.4 OD middle-ground check</text>
    <line x1="40" y1="78" x2="480" y2="78" class="divider"/>

    <line x1="348" y1="124" x2="348" y2="376" class="ext"/>
    <text x="340" y="102" text-anchor="end" class="tiny">Block side face</text>

    <rect x="96" y="169.2" width="231" height="161.6" class="part"/>
    <rect x="264" y="160.8" width="12.6" height="178.4" class="part"/>
    <rect x="327" y="134.5" width="21" height="231" rx="4" ry="4" class="part"/>
    <rect x="331" y="137.6" width="13" height="224.7" rx="3" ry="3" class="seal"/>
    <rect x="348" y="161.8" width="42" height="176.4" rx="8" ry="8" class="part"/>
    <rect x="390" y="134.5" width="63" height="231" rx="24" ry="24" class="part"/>
    <rect x="96" y="173.9" width="357" height="152.2" class="water"/>

    <line x1="96" y1="402" x2="348" y2="402" class="dim"/>
    <line x1="96" y1="330.8" x2="96" y2="402" class="ext"/>
    <line x1="348" y1="365.5" x2="348" y2="402" class="ext"/>
    <text x="222" y="426" text-anchor="middle" class="label">24 plug projection</text>

    <text x="44" y="106" class="tiny">Same outer length</text>
    <text x="44" y="120" class="tiny">and bead location</text>
    <line x1="160" y1="116" x2="270" y2="165.0" class="leader"/>
    <text x="432" y="100" text-anchor="middle" class="tiny">Trapped head and</text>
    <text x="432" y="114" text-anchor="middle" class="tiny">neck unchanged</text>
    <line x1="432" y1="118" x2="434" y2="134.5" class="leader"/>

    <circle cx="120" cy="472" r="45" class="water"/>
    <text x="120" y="478" text-anchor="middle" class="small">15.4</text>
    <text x="188" y="458" class="label">Outer hose OD</text>
    <text x="188" y="482" class="small">Use if 16.0 feels too tight but 14.8</text>
    <text x="188" y="504" class="small">looks unnecessarily loose.</text>

    <line x1="40" y1="526" x2="480" y2="526" class="divider"/>
    <text x="260" y="550" text-anchor="middle" class="small">Prototype order can use quantity 1; final selected size should be quoted as quantity 2.</text>
  </g>

  <g transform="translate(1330,170)">
    <rect x="0" y="0" width="520" height="560" rx="10" ry="10" class="noteBox"/>
    <text x="260" y="36" text-anchor="middle" class="subtitle">Option C</text>
    <text x="260" y="62" text-anchor="middle" class="label">16.0 OD installed main guess</text>
    <line x1="40" y1="78" x2="480" y2="78" class="divider"/>

    <line x1="348" y1="124" x2="348" y2="376" class="ext"/>
    <text x="340" y="102" text-anchor="end" class="tiny">Block side face</text>

    <rect x="96" y="166.0" width="231" height="168.0" class="part"/>
    <rect x="264" y="157.6" width="12.6" height="184.8" class="part"/>
    <rect x="327" y="134.5" width="21" height="231" rx="4" ry="4" class="part"/>
    <rect x="331" y="137.6" width="13" height="224.7" rx="3" ry="3" class="seal"/>
    <rect x="348" y="161.8" width="42" height="176.4" rx="8" ry="8" class="part"/>
    <rect x="390" y="134.5" width="63" height="231" rx="24" ry="24" class="part"/>
    <rect x="96" y="173.9" width="357" height="152.2" class="water"/>

    <line x1="96" y1="402" x2="348" y2="402" class="dim"/>
    <line x1="96" y1="334.0" x2="96" y2="402" class="ext"/>
    <line x1="348" y1="365.5" x2="348" y2="402" class="ext"/>
    <text x="222" y="426" text-anchor="middle" class="label">24 plug projection</text>

    <text x="34" y="94" class="tiny">Largest hose OD</text>
    <text x="34" y="108" class="tiny">with the same</text>
    <text x="34" y="122" class="tiny">trapped root</text>
    <line x1="158" y1="116" x2="270" y2="162.0" class="leader"/>
    <text x="430" y="100" text-anchor="middle" class="tiny">22 x 15 x 6</text>
    <text x="430" y="114" text-anchor="middle" class="tiny">capture head</text>
    <line x1="430" y1="118" x2="434" y2="134.5" class="leader"/>

    <circle cx="120" cy="472" r="48" class="water"/>
    <text x="120" y="478" text-anchor="middle" class="small">16.0</text>
    <text x="188" y="458" class="label">Outer hose OD</text>
    <text x="188" y="482" class="small">Current installed main guess for the assembled</text>
    <text x="188" y="504" class="small">preview and final hybrid quote study.</text>

    <line x1="40" y1="526" x2="480" y2="526" class="divider"/>
    <text x="260" y="550" text-anchor="middle" class="small">Only the outer hose OD changes between options; the lid and base stay the same.</text>
  </g>

  <g transform="translate(70,790)">
    <rect x="0" y="0" width="1780" height="170" rx="10" ry="10" class="noteBox"/>
    <text x="20" y="34" class="label">Shared plug-root geometry: 22 OD face-seal flange x 2 thick | 16.8 OD neck x 4 long | rounded trapped head 22 x 15 x 6 | 14.5 bore through all three.</text>
    <text x="20" y="66" class="label">Near-scale hose section: the 14.5 bore is shown as a straight rectangular cut because the real coupon bore is a simple straight-through path and the remaining wall is thin.</text>
    <text x="20" y="98" class="label">Prototype use: print one of each size for hose-fit study. Final hybrid quote use: quote the selected hose-plug size as a pair, one for each port.</text>
    <text x="20" y="130" class="label">These are fit and interface parts only in PLA. The final wet release remains CNC POM hose plugs with the same trapped-root architecture.</text>
    <text x="20" y="162" class="label">Keep the outside hose profile, bead location, flange face, and trapped head unchanged unless the design baseline is deliberately revised.</text>
  </g>
</svg>
