<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2060 1560" width="2060" height="1560">
  <defs>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #1f2933; }
      .subtitle { font: 700 18px Arial, sans-serif; fill: #1f2933; }
      .label { font: 14px Arial, sans-serif; fill: #1f2933; }
      .small { font: 12px Arial, sans-serif; fill: #1f2933; }
      .tiny { font: 11px Arial, sans-serif; fill: #1f2933; }
      .outline { fill: none; stroke: #1f2933; stroke-width: 2; }
      .hidden { fill: none; stroke: #7b90b8; stroke-width: 1.5; stroke-dasharray: 8 6; }
      .divider { fill: none; stroke: #98a1af; stroke-width: 1.2; }
      .water { fill: #d9ecff; stroke: #2563eb; stroke-width: 1.5; }
      .metalA { fill: #f7f8fa; stroke: #1f2933; stroke-width: 2; }
      .metalB { fill: #e6e9ef; stroke: #1f2933; stroke-width: 2; }
      .oring { fill: none; stroke: #2f7d4a; stroke-width: 2; stroke-dasharray: 10 5; }
      .noteBox { fill: #fcfdff; stroke: #1f2933; stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="2060" height="1560" fill="#fff"/>

  <text x="1030" y="48" text-anchor="middle" class="title">Cold-Block Combined Preview</text>
  <text x="1030" y="78" text-anchor="middle" class="label">One-sheet overview of the assembled block, lid, base, and hose-fit coupon set</text>
  <text x="1030" y="102" text-anchor="middle" class="small">Units: mm | Scale: not to scale | Source of truth: tec_cold_block_mockup.scad</text>
  <text x="1030" y="124" text-anchor="middle" class="small">Reference diagram only; use formal CAD and a release drawing for manufacturing.</text>

  <g transform="translate(80,190)">
    <text x="0" y="-24" class="subtitle">Assembled Block Overview</text>
    <rect x="0" y="0" width="900" height="500" class="noteBox"/>
    <g transform="translate(40,20)">
      <rect x="30" y="40" width="700" height="300" class="outline"/>
      <rect x="100" y="90" width="560" height="210" class="hidden"/>
      <polygon points="100,174 240,90 240,300 100,216" class="hidden"/>
      <polygon points="520,90 660,174 660,216 520,300" class="hidden"/>
      <rect x="220" y="85" width="320" height="220" class="outline"/>
      <rect x="250" y="115" width="260" height="160" class="outline"/>
      <rect x="90" y="75" width="580" height="240" class="oring"/>
      <circle cx="65" cy="65" r="8.5" class="outline"/>
      <circle cx="185" cy="65" r="10.75" class="outline"/>
      <circle cx="380" cy="65" r="8.5" class="outline"/>
      <circle cx="575" cy="65" r="10.75" class="outline"/>
      <circle cx="695" cy="65" r="8.5" class="outline"/>
      <circle cx="65" cy="315" r="8.5" class="outline"/>
      <circle cx="185" cy="315" r="10.75" class="outline"/>
      <circle cx="380" cy="315" r="8.5" class="outline"/>
      <circle cx="575" cy="315" r="10.75" class="outline"/>
      <circle cx="695" cy="315" r="8.5" class="outline"/>
    </g>
    <line x1="40" y1="384" x2="860" y2="384" class="divider"/>
    <text x="40" y="414" class="small">140 x 92 x 24 body | 6 straight lanes | 14.5 mm min bore</text>
    <text x="40" y="440" class="small">28 mm transitions | 64 x 64 landing | 6-screw split body</text>
  </g>

  <g transform="translate(1080,190)">
    <text x="0" y="-24" class="subtitle">Lid Underside</text>
    <rect x="0" y="0" width="900" height="500" class="noteBox"/>
    <g transform="translate(40,20)">
      <rect x="30" y="40" width="700" height="300" class="outline"/>
      <polygon points="100,170 240,89 240,291 100,210" class="water"/>
      <polygon points="520,89 660,170 660,210 520,291" class="water"/>
      <rect x="240" y="89" width="280" height="28.3" class="water"/>
      <rect x="240" y="123.8" width="280" height="28.3" class="water"/>
      <rect x="240" y="158.7" width="280" height="28.3" class="water"/>
      <rect x="240" y="193.5" width="280" height="28.3" class="water"/>
      <rect x="240" y="228.3" width="280" height="28.3" class="water"/>
      <rect x="240" y="263.1" width="280" height="28.3" class="water"/>
      <circle cx="65" cy="65" r="8.5" class="outline"/>
      <circle cx="185" cy="65" r="10.75" class="outline"/>
      <circle cx="380" cy="65" r="8.5" class="outline"/>
      <circle cx="575" cy="65" r="10.75" class="outline"/>
      <circle cx="695" cy="65" r="8.5" class="outline"/>
      <circle cx="65" cy="315" r="8.5" class="outline"/>
      <circle cx="185" cy="315" r="10.75" class="outline"/>
      <circle cx="380" cy="315" r="8.5" class="outline"/>
      <circle cx="575" cy="315" r="10.75" class="outline"/>
      <circle cx="695" cy="315" r="8.5" class="outline"/>
    </g>
    <line x1="40" y1="384" x2="860" y2="384" class="divider"/>
    <text x="40" y="414" class="small">Lid underside reuses the dedicated lid sheet geometry: six aligned lanes,</text>
    <text x="40" y="440" class="small">shared split support, and six 3.4 mm clearance holes.</text>
  </g>

  <g transform="translate(80,820)">
    <text x="0" y="-24" class="subtitle">Base Split-Plane Face</text>
    <rect x="0" y="0" width="900" height="500" class="noteBox"/>
    <g transform="translate(40,20)">
      <rect x="30" y="40" width="700" height="300" class="outline"/>
      <rect x="240" y="90" width="280" height="210" class="hidden"/>
      <polygon points="100,174 240,90 240,300 100,216" class="hidden"/>
      <polygon points="520,90 660,174 660,216 520,300" class="hidden"/>
      <rect x="90" y="75" width="580" height="240" class="oring"/>
      <circle cx="65" cy="65" r="6.25" class="outline"/>
      <circle cx="185" cy="65" r="10.75" class="outline"/>
      <circle cx="380" cy="65" r="6.25" class="outline"/>
      <circle cx="575" cy="65" r="10.75" class="outline"/>
      <circle cx="695" cy="65" r="6.25" class="outline"/>
      <circle cx="65" cy="315" r="6.25" class="outline"/>
      <circle cx="185" cy="315" r="10.75" class="outline"/>
      <circle cx="380" cy="315" r="6.25" class="outline"/>
      <circle cx="575" cy="315" r="10.75" class="outline"/>
      <circle cx="695" cy="315" r="6.25" class="outline"/>
    </g>
    <line x1="40" y1="384" x2="860" y2="384" class="divider"/>
    <text x="40" y="414" class="small">Base face reuses the dedicated base sheet geometry: groove carrier,</text>
    <text x="40" y="440" class="small">lower split support, lower manifold floors, and 2.5 mm pilot holes.</text>
  </g>

  <g transform="translate(1080,820)">
    <text x="0" y="-24" class="subtitle">Hose-Fit Coupon Set</text>
    <rect x="0" y="0" width="900" height="500" class="noteBox"/>
    <g transform="translate(70,96)">
      <g transform="translate(0,0)">
        <rect x="0" y="120" width="180" height="36" rx="6" ry="6" class="metalB"/>
        <rect x="26" y="76" width="136" height="66" rx="8" ry="8" class="water"/>
        <circle cx="56" cy="274" r="33" class="water"/>
        <text x="56" y="280" text-anchor="middle" class="small">14.8</text>
        <text x="0" y="16" class="label">Coupon A</text>
        <text x="0" y="38" class="small">14.8 OD</text>
        <text x="0" y="198" class="small">Easy-fit fallback</text>
      </g>
      <g transform="translate(270,0)">
        <rect x="0" y="120" width="180" height="36" rx="6" ry="6" class="metalB"/>
        <rect x="26" y="74" width="136" height="70" rx="8" ry="8" class="water"/>
        <circle cx="56" cy="274" r="35" class="water"/>
        <text x="56" y="280" text-anchor="middle" class="small">15.4</text>
        <text x="0" y="16" class="label">Coupon B</text>
        <text x="0" y="38" class="small">15.4 OD</text>
        <text x="0" y="198" class="small">Middle-ground fit</text>
      </g>
      <g transform="translate(540,0)">
        <rect x="0" y="120" width="180" height="36" rx="6" ry="6" class="metalB"/>
        <rect x="26" y="72" width="136" height="76" rx="8" ry="8" class="water"/>
        <circle cx="56" cy="274" r="37" class="water"/>
        <text x="56" y="280" text-anchor="middle" class="small">16.0</text>
        <text x="0" y="16" class="label">Main Guess</text>
        <text x="0" y="38" class="small">16.0 OD</text>
        <text x="0" y="198" class="small">Best-guess full-block spigot</text>
      </g>
    </g>
    <line x1="40" y1="384" x2="860" y2="384" class="divider"/>
    <text x="40" y="414" class="small">All three share the same bead style and insertion length. These are fit gauges only,</text>
    <text x="40" y="440" class="small">not leak or flow parts.</text>
  </g>

  <g transform="translate(80,1380)">
    <rect x="0" y="0" width="1900" height="120" class="noteBox"/>
    <text x="20" y="34" class="label">Combined sheet is a cross-sheet index; use the dedicated whole, lid, base, and coupon sheets for detailed geometry review.</text>
    <text x="20" y="64" class="label">Shared ownership rule: lid carries the upper split support and base carries the lower split support at the split plane.</text>
    <text x="20" y="94" class="label">Support frame is included in the first fit prototype order and is documented separately in the prototype support preview/export set.</text>
  </g>
</svg>